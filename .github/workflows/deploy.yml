name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t transcoding-frontend ./frontend

      - name: Tag image
        run: |
          docker tag transcoding-frontend:latest \
          975049973618.dkr.ecr.us-east-1.amazonaws.com/transcoding-frontend:latest

      - name: Push image to ECR
        run: |
          docker push 975049973618.dkr.ecr.us-east-1.amazonaws.com/transcoding-frontend:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
          --cluster ${{ secrets.ECS_CLUSTER }} \
          --service ${{ secrets.ECS_SERVICE }} \
          --force-new-deployment
