name: Deploy to ECS (with AWS Session Token)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: video-platform
  ECS_CLUSTER: video-cluster
  ECS_SERVICE_WEB: video-web
  ECS_SERVICE_WORKER: video-worker

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔐 Configure AWS credentials (WITH TOKEN)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔑 Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 🏗️ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:latest .

      # 🏷️ Tag Docker image
      - name: Tag Docker image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest
          docker tag $ECR_REPOSITORY:latest $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      # 📤 Push image to ECR
      - name: Push Docker image
        run: |
          docker push $IMAGE_URI

      # 🔁 Deploy Web Service
      - name: Force new deployment (Web)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_WEB \
            --force-new-deployment

      # 🔁 Deploy Worker Service
      - name: Force new deployment (Worker)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_WORKER \
            --force-new-deployment
