services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: transcoding_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: transcoding_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (message broker + result backend) ───────────────
  redis:
    image: redis:7-alpine
    container_name: transcoding_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible local storage) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: transcoding_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Flask API ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transcoding_api
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/transcoding_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_RAW_BUCKET: transcoding-raw-videos
      S3_PROCESSED_BUCKET: transcoding-processed-videos
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: gunicorn -w 2 -b 0.0.0.0:5000 run:app

  # ── Celery Worker (FFmpeg transcoding) ────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/transcoding_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_RAW_BUCKET: transcoding-raw-videos
      S3_PROCESSED_BUCKET: transcoding-processed-videos
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A celery_worker.celery_app worker --loglevel=info --concurrency=4
    deploy:
      replicas: 2   # Scale horizontally

  # ── Celery Flower (worker monitoring UI) ──────────────────
  flower:
    image: mher/flower:2.0.1
    container_name: transcoding_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transcoding_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: transcoding_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  minio_data:
